name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — SonarQube Code Quality Scan
  # ─────────────────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ─────────────────────────────────────────
  # JOB 2 — Trivy Security Vulnerability Scan
  # ─────────────────────────────────────────
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────
  # JOB 3 — Build & Push Docker Images
  # ─────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [sonarqube, trivy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: krishnakapale/civic-server:latest

      - name: Build & push ML service image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: true
          tags: krishnakapale/civic-ml:latest

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: krishnakapale/civic-client:latest

  # ─────────────────────────────────────────
  # JOB 4 — Deploy to Render (Server + ML)
  # ─────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Deploy Server to Render
        run: |
          curl -X POST "${{ secrets.RENDER_SERVER_HOOK }}"

      - name: Deploy ML Service to Render
        run: |
          curl -X POST "${{ secrets.RENDER_ML_HOOK }}"

  # ─────────────────────────────────────────
  # JOB 5 — Deploy Frontend to Vercel
  # ─────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel --token=${{ secrets.VERCEL_TOKEN }} \
                 --prod \
                 --yes \
                 --cwd ./client
