apiVersion: v1
kind: Service
metadata:
  name: civic-server-svc
  labels:
    app: civic-server
spec:
  type: LoadBalancer
  selector:
    app: civic-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: civic-ml-svc
  labels:
    app: civic-ml
spec:
  type: ClusterIP
  selector:
    app: civic-ml
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
